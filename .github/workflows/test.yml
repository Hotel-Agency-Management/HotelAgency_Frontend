name: Test & Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_URL: https://placeholder.example.com
          NEXT_PUBLIC_ENABLE_MOCKS: false
          NEXT_PUBLIC_BLOB_URL: ${{ secrets.NEXT_PUBLIC_BLOB_URL }}
          NEXT_PUBLIC_BLOB_CONTAINER_PROFILES: ${{ secrets.NEXT_PUBLIC_BLOB_CONTAINER_PROFILES }}
